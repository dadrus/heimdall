log:
  format: ${log_format}
  level: ${log_level}

profiling:
  enabled: ${profiling_enabled}

metrics:
  enabled: ${metrics_enabled}

tracing:
  enabled: ${tracing_enabled}

secret_management:
  tls_keys:
    type: pem
    config:
      path: /etc/heimdall/certs/ssl/tls-combined.pem
      watch: true
  jwt_keys:
    type: pem
    config:
      path: /etc/heimdall/certs/jwt/tls-combined.pem
      watch: true

serve:
  tls:
    min_version: TLS1.2
    secret:
      source: tls_keys
  trusted_proxies:
    - 0.0.0.0/0

management:
  tls:
    min_version: TLS1.2
    secret:
      source: tls_keys

mechanisms:
  authenticators:
    - id: anonymous_authenticator
      type: anonymous
    - id: deny_authenticator
      type: unauthorized
  authorizers:
    - id: deny_all_requests
      type: deny
    - id: allow_all_requests
      type: allow
  finalizers:
    - id: create_jwt
      type: jwt
      config:
        signer:
          secret:
            source: jwt_keys
  error_handlers:
    - id: redirect
      type: redirect
      config:
        to: https://foo.bar?origin={{ .Request.URL | urlenc }}

default_rule:
  execute:
    - authenticator: anonymous_authenticator
    - authorizer: deny_all_requests
  on_error:
    - if: type(Error) == authentication_error
      error_handler: redirect

providers:
  kubernetes:
    tls:
      min_version: TLS1.2
      secret:
        source: tls_keys