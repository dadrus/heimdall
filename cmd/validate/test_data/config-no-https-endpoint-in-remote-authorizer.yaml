secret_management:
  tls_keys:
    type: pem
    config:
      path: "${TEST_KEYSTORE_FILE}"

serve:
  port: 4468
  tls:
    secret:
      source: tls_keys

management:
  tls:
    secret:
      source: tls_keys

mechanisms:
  authenticators:
    - id: some_authenticator
      type: anonymous

  authorizers:
    - id: some_authorizer
      type: remote
      config:
        endpoint:
          url: http://example.com
          method: POST
        payload: foo
        expressions:
          - expression: "Payload.foo == 'bar'"

  finalizers:
    - id: some_finalizer
      type: noop

providers:
  file_system:
    src: test_rules.yaml
    watch: true
