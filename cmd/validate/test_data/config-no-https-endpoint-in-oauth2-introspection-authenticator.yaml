secret_management:
  tls_keys:
    type: pem
    config:
      path: "${TEST_KEYSTORE_FILE}"

serve:
  port: 4468
  tls:
    secret:
      source: tls_keys

management:
  tls:
    secret:
      source: tls_keys

mechanisms:
  authenticators:
    - id: some_authenticator
      type: oauth2_introspection
      config:
        introspection_endpoint:
          url: http://example.com/oauth2/introspect
        assertions:
          issuers:
            - bla

  finalizers:
    - id: some_finalizer
      type: noop

providers:
  file_system:
    src: test_rules.yaml
    watch: true
